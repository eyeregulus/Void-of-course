  googleapis_auth: ^2.3.1
  googleapis: ^13.2.0  # Google Calendar API
  purchases_flutter: ^10.1.1
  firebase_remote_config: ^6.5.2
  package_info_plus: ^9.0.1


dependency_overrides:
  package_info_plus: ^9.0.0  # 업데이트: 최신 버전 
  flutter_background_service_android:
    path: packages/flutter_background_service_android
  meta: 1.18.0
  test_api: 0.7.11

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0  # 업데이트: 최신 버전
  rename: ^3.1.0

flutter:
  generate: true
  assets:
    - assets/sweph/
    - assets/app_Image/

  uses-material-design: true